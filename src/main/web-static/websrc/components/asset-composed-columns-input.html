<body>
<script id="asset-composed-columns-input" type="text/x-handlebars-template">

    <td class="text-wrap-break-word">

        <input type="hidden"
               name="{{assetIdHiddenFieldName}}"
               value="{{assetId}}"
               data-null-if-empty
        />

        {{#if assetId}}
            {{assetTicker}}
        {{else}}

            <div class="input-group">

                <input type="text"
                       name="{{assetTickerFieldName}}"
                       placeholder="Asset ticker"
                       aria-label="Asset ticker"
                       autocomplete="off"
                       class="form-control"
                       value="{{assetTicker}}"
                       list="datalist-assets"
                       hx-validate="true"
                       hx-on::validation:validate="{{assetTickerFieldHTMXOnValidate}}"
                       oninput="maskTickerInput(this)"
                       onkeydown="AssetComposedColumnsInput.handleAssetTickerKeydown(event)"
                       maxlength="40"
                />
                <button data-asset-action-button
                        type="button"
                        class="btn btn-primary btn-xs"
                        onclick="{{assetActionButtonOnClick}}"
                >
                    <span class="bi bi-search"></span>
                </button>

            </div>

            <div data-new-asset-ticker-message
                 class="form-text"
                 style="display: none"
            >
                * Creating new asset
            </div>

            <div data-asset-ticker-extra-error-message="{{assetTickerFieldName}}" class="invalid-feedback"></div>

        {{/if}}

    </td>

    <td class="text-wrap-break-word">

        {{#if assetName}}
            {{assetName}}
        {{else}}
            <input type="text"
                   name="{{assetNameFieldName}}"
                   placeholder="Asset name"
                   aria-label="Asset name"
                   autocomplete="off"
                   class="form-control"
                   value="{{assetName}}"
                   style="display: none"
                   maxlength="100"
            />
        {{/if}}

    </td>

</script>

<script type="text/javascript">

    HandlebarsUtils.registerPartialToContainer(
            "datalist-container",
            "asset-composed-columns-input"
    );

    HtmxInfra.addReadyConditionToWaitingElement('[data-portfolio-route-component]', 'asset-columns-input-initialized');

</script>
</body>
